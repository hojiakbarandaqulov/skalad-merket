server:
  url: http://localhost:8087

spring:
  datasource:
    url: jdbc:h2:mem:chatdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

aws:
  url: http://localhost:9000
  access-key: test
  secret-key: test
  bucket-name: test-bucket

chat:
  websocket:
    token-expiration-seconds: 60
    token-secret: test-chat-websocket-secret-1234567890

media:
  base-url: http://localhost:9000/test-bucket
