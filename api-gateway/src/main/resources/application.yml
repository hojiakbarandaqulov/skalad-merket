spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true

      routes:
        # Auth Service
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users,/api/v1/users/**,/api/v1/attach/**,/api/v1/location/**,/api/v1/admin/users,/api/v1/admin/users/**

        # Company Service
        - id: company-service
          uri: lb://company-service
          predicates:
            - Path=/api/v1/companies,/api/v1/companies/**,/api/v1/admin/companies,/api/v1/admin/companies/**
        #Category
        - id: category-service
          uri: lb://category-service
          predicates:
            - Path=/api/v1/category,/api/v1/category/**,/api/v1/admin/categories,/api/v1/admin/categories/**
        #Product
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products,/api/v1/products/**,/api/v1/favorites,/api/v1/favorites/**,/api/v1/catalog,/api/v1/catalog/**,/api/v1/admin/products,/api/v1/admin/products/**
        #Lead
        - id: lead-service
          uri: lb://lead-service
          predicates:
            - Path=/api/v1/leads/**
        # Chat REST
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/v1/chats/**
        # Chat WebSocket
        - id: chat-service-ws
          uri: lb:ws://chat-service
          predicates:
            - Path=/api/v1/ws/chat,/api/v1/ws/chat/**
        # Notification
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

server:
  port: 8080

