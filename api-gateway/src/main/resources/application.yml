server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**
            - id: post-service
              uri: lb://post-service
              predicates:
                - Path=/posts/**
            - id: reaction-service
              uri: lb://reaction-service
              predicates:
                - Path=/reactions/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
