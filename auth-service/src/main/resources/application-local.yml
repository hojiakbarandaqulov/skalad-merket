server:
  domain: http://localhost
  port: 8081

spring:
  application:
    name: auth-service


  # DATABASE
  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-auth-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true



