server:
  address: 0.0.0.0
  domain: ${SERVER_DOMAIN:http://45.138.159.253}
  port: 8081

spring:
  application:
    name: auth-service


  # DATABASE
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:skalad-market-auth-db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  # Kafka Producer config
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    # Kafka Consumer config
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://45.138.159.253:9090/realms/market-realm}

keycloak:
  token-url: ${KEYCLOAK_TOKEN_URL:http://45.138.159.253:9090/realms/market-realm/protocol/openid-connect/token}
  client-id: ${KEYCLOAK_CLIENT_ID:market-backend}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:Pi5lwDJnYn9TWcc1iLQzJsUGaHeEx8FK}
  admin-url: ${KEYCLOAK_ADMIN_URL:http://45.138.159.253:9090/admin/realms/market-realm}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://45.138.159.253:8761/eureka/}
  instance:
    prefer-ip-address: true
    ip-address: ${SERVER_IP:45.138.159.253}
    instance-id: ${spring.application.name}:${server.port}

