# docker-compose.yml
version: '3.8'
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  skalad-market-auth-db:
    image: postgres:16
    container_name: skalad-market-auth-db
    environment:
      POSTGRES_DB: skalad-market-auth-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"

  skalad-market-user-db:
    image: postgres:16
    container_name: skalad-market-user-db
    environment:
      POSTGRES_DB: skalad-market-user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"     # 2 ta bo'sh joy (indent)

  skalad-market-product-db:
      image: postgres:16
      container_name: skalad-market-product-db
      environment:
        POSTGRES_DB: skalad-market-product-db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: 1234
      ports:
        - "5435:5432"

  skalad-market-company-db:
    image: postgres:16
    container_name: skalad-market-company-db
    environment:
      POSTGRES_DB: skalad-market-company-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5436:5432"

  skalad-market-category-db:
    image: postgres:16
    container_name: skalad-market-category-db
    environment:
      POSTGRES_DB: skalad-market-category-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5437:5432"

  skalad-market-report-db:
    image: postgres:16
    container_name: skalad-market-report-db
    environment:
      POSTGRES_DB: skalad-market-report-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5438:5432"
  skalad-market-chat-db:
    image: postgres:16
    container_name: skalad-market-chat-db
    environment:
      POSTGRES_DB: skalad-market-chat-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5439:5432"

  skalad-market-lead-db:
    image: postgres:16
    container_name: skalad-market-lead-db
    environment:
      POSTGRES_DB: skalad-market-lead-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5440:5432"
  skalad-market-notification-db:
    image: postgres:16
    container_name: skalad-market-notification-db
    environment:
      POSTGRES_DB: skalad-market-notification-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5441:5432"
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped


  keycloak:
      image: quay.io/keycloak/keycloak:24.0
      container_name: keycloak
      command: start-dev
      ports:
        - "9090:8080"
      environment:
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: admin

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/skalad-market;
      mc anonymous set public local/skalad-market;
      exit 0;
      "

volumes:
  elasticsearch-data:
  minio-data: