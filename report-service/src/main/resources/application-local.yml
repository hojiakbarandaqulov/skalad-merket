server:
  domain: http://localhost
  port: 8089

spring:
  application:
    name: report-service

  # DATABASE
  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-report-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/market-realm

